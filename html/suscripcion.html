<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Suscripción del Usuario</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background-color: #f8f9fa;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    .section {
      background-color: white;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      max-width: 700px;
      margin-bottom: 2rem;
    }

    .section h2 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: #333;
    }

    .info-row {
      margin-bottom: 0.75rem;
    }

    .info-label {
      font-weight: bold;
      color: #444;
    }

    .info-value {
      margin-top: 0.25rem;
      color: #555;
    }

    .renew-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }

    select, input {
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .total {
      font-weight: bold;
      font-size: 1.2rem;
      color: #333;
    }

    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 6px;
      background-color: #28a745;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      width: fit-content;
    }

    .btn:hover {
      background-color: #218838;
    }
  </style>
</head>

<body>

  <h1>Mi Suscripción</h1>

  <div class="section">
    <h2>Información actual</h2>
    <div class="info-row">
      <div class="info-label">Estado</div>
      <div class="info-value">Activa</div>
    </div>
    <div class="info-row">
      <div class="info-label">Fecha de inicio</div>
      <div class="info-value">01/06/2025</div>
    </div>
    <div class="info-row">
      <div class="info-label">Fecha de expiración</div>
      <div class="info-value">30/06/2025</div>
    </div>
    <div class="info-row">
      <div class="info-label">Plan mensual</div>
      <div class="info-value">S/. 35.00</div>
    </div>
  </div>

  <div class="section">
    <h2>Renovar suscripción</h2>
    <form class="renew-form">
      <label for="meses">¿Cuántos meses deseas renovar?</label>
      <select id="meses" onchange="calcularTotal()">
        <option value="1">1 mes</option>
        <option value="3">3 meses</option>
        <option value="6">6 meses</option>
        <option value="12">12 meses</option>
      </select>

      <div class="info-row">
        <div class="info-label">Precio mensual</div>
        <div class="info-value">S/. <span id="precio-mensual">35.00</span></div>
      </div>

      <div class="total">Total: S/. <span id="total">35.00</span></div>

      <button type="button" class="btn" onclick="pagar()">Realizar pago en línea</button>
    </form>
  </div>

  <script>
    const precioMensual = 35.00;

    function calcularTotal() {
      const meses = parseInt(document.getElementById('meses').value);
      const total = meses * precioMensual;
      document.getElementById('total').innerText = total.toFixed(2);
    }

    function pagar() {
      const meses = document.getElementById('meses').value;
      const total = document.getElementById('total').innerText;
      alert(`Redirigiendo al pago por ${meses} mes(es) – Total: S/. ${total}`);
      // Aquí podrías redirigir a una pasarela real de pago
    }
  </script>

</body>

</html>
